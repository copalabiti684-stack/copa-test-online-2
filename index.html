<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COPA Online Test Portal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
margin:0;
padding:0;
background:#f2f2f2;
}

header{
background:#003366;
color:white;
padding:15px;
text-align:center;
font-size:28px;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
padding:20px;
background:white;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, button, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#003366;
color:white;
cursor:pointer;
}

button:hover{
background:#0055aa;
}

.question{
margin-top:20px;
padding:15px;
border:1px solid #ccc;
border-radius:10px;
}

.option{
margin:8px 0;
padding:8px;
border:1px solid #ddd;
border-radius:5px;
cursor:pointer;
}

.option:hover{
background:#e8f0ff;
}

.timer{
font-size:22px;
font-weight:bold;
color:red;
text-align:right;
}

.hidden{
display:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table, th, td{
border:1px solid #ccc;
}

th, td{
padding:10px;
text-align:center;
}
</style>
</head>
<body>

<header>
COPA Online Test Portal
</header>

<div class="container" id="loginPage">
<h2>Student Login</h2>
<input type="text" id="studentName" placeholder="Enter Student Name">
<input type="text" id="rollNumber" placeholder="Enter Roll Number">
<button onclick="startTest()">Start Test</button>
</div>

<div class="container hidden" id="testPage">
<div class="timer" id="timer">30:00</div>
<div id="questionsContainer"></div>
<button onclick="submitTest()">Submit Test</button>
</div>

<div class="container hidden" id="resultPage">
<h2>Test Result</h2>
<h3 id="resultText"></h3>
</div>

<div class="container">
<h2>Teacher Panel</h2>
<input type="password" id="teacherPassword" placeholder="Enter Teacher Password">
<button onclick="openTeacherPanel()">Open Teacher Panel</button>

<div id="teacherPanel" class="hidden">
<h3>Add New Question</h3>
<textarea id="newQuestion" placeholder="Enter Question"></textarea>
<input type="text" id="opt1" placeholder="Option 1">
<input type="text" id="opt2" placeholder="Option 2">
<input type="text" id="opt3" placeholder="Option 3">
<input type="text" id="opt4" placeholder="Option 4">
<input type="number" id="correctAnswer" placeholder="Correct Option Number (1-4)">
<button onclick="addQuestion()">Add Question</button>

<h3>Student Results</h3>
<button onclick="downloadExcel()">Download Excel</button>
<table id="resultTable">
<thead>
<tr>
<th>Name</th>
<th>Roll No</th>
<th>Marks</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<script>
const questions = [

{
q:"CPU ka full form kya hai?",
options:[
"Central Processing Unit",
"Central Process Unit",
"Computer Processing Unit",
"Control Processing Unit"
],
answer:0
},

{
q:"Which software is used for spreadsheet?",
options:[
"MS Word",
"MS Excel",
"Paint",
"Notepad"
],
answer:1
},

{
q:"HTML stands for?",
options:[
"Hyper Text Markup Language",
"High Text Machine Language",
"Hyper Tool Multi Language",
"Home Text Markup Language"
],
answer:0
}

];

let currentAnswers = [];
let timer;
let timeLeft = 1800;

function startTest(){
let name = document.getElementById("studentName").value;
let roll = document.getElementById("rollNumber").value;

if(name=="" || roll==""){
alert("Please enter name and roll number");
return;
}

localStorage.setItem("studentName", name);
localStorage.setItem("rollNumber", roll);

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("testPage").classList.remove("hidden");
questions.sort(() => Math.random() - 0.5);
showQuestions();
startTimer();
}

function showQuestions(){
let container = document.getElementById("questionsContainer");
container.innerHTML = "";

questions.forEach((question,index)=>{
let div = document.createElement("div");
div.className = "question";

let html = `<h3>Q${index+1}. ${question.q}</h3>`;

question.options.forEach((opt,optIndex)=>{
html += `
<div class="option">
<input type="radio" name="q${index}" value="${optIndex}">
${opt}
</div>`;
});

div.innerHTML = html;
container.appendChild(div);
});
}

function startTimer(){
timer = setInterval(()=>{
let minutes = Math.floor(timeLeft/60);
let seconds = timeLeft%60;

document.getElementById("timer").innerText =
`${minutes}:${seconds<10?'0':''}${seconds}`;

timeLeft--;

if(timeLeft<0){
clearInterval(timer);
submitTest();
}
},1000);
}

function submitTest(){
clearInterval(timer);

let score = 0;

questions.forEach((q,index)=>{
let selected = document.querySelector(`input[name='q${index}']:checked`);

if(selected && parseInt(selected.value)===q.answer){
score++;
}
});

let name = localStorage.getItem("studentName");
let roll = localStorage.getItem("rollNumber");

let results = JSON.parse(localStorage.getItem("results") || "[]");

results.push({
name:name,
roll:roll,
marks:score
});

localStorage.setItem("results", JSON.stringify(results));

document.getElementById("testPage").classList.add("hidden");
document.getElementById("resultPage").classList.remove("hidden");

document.getElementById("resultText").innerHTML =
`${name} (${roll})<br>Your Score: ${score} / ${questions.length}`;

loadResults();
}

function openTeacherPanel(){
let pass = document.getElementById("teacherPassword").value;

if(pass === "admin123"){
document.getElementById("teacherPanel").classList.remove("hidden");
loadResults();
}else{
alert("Wrong Password");
}
}

function addQuestion(){
let q = document.getElementById("newQuestion").value;
let o1 = document.getElementById("opt1").value;
let o2 = document.getElementById("opt2").value;
let o3 = document.getElementById("opt3").value;
let o4 = document.getElementById("opt4").value;
let ans = parseInt(document.getElementById("correctAnswer").value)-1;

questions.push({
q:q,
options:[o1,o2,o3,o4],
answer:ans
});

alert("Question Added Successfully");
}

function loadResults(){
let results = JSON.parse(localStorage.getItem("results") || "[]");
let tbody = document.querySelector("#resultTable tbody");

tbody.innerHTML = "";

results.forEach(r=>{
let row = `
<tr>
<td>${r.name}</td>
<td>${r.roll}</td>
<td>${r.marks}</td>
</tr>`;

tbody.innerHTML += row;
});
}

function downloadExcel(){
let results = JSON.parse(localStorage.getItem("results") || "[]");

let worksheet = XLSX.utils.json_to_sheet(results);
let workbook = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(workbook, worksheet, "Results");

XLSX.writeFile(workbook, "COPA_Results.xlsx");
}
</script>

</body>
</html>
